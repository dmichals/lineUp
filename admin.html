<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineUp — Admin</title>
<style>
body { font-family: monospace; background: #0a1628; color: #e8f4fd; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 8px; color: #5aaee8; }
p  { font-size: 13px; color: #4a6a8a; margin-bottom: 24px; text-align: center; }
.card { background: #0d1b2e; border: 1px solid rgba(45,127,193,0.3); border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; }
label { font-size: 12px; color: #4a6a8a; display: block; margin-bottom: 6px; letter-spacing: 1px; }
input { width: 100%; background: #061020; border: 1px solid rgba(45,127,193,0.3); color: #e8f4fd; padding: 10px 12px; border-radius: 6px; font-family: monospace; font-size: 14px; outline: none; margin-bottom: 16px; }
input:focus { border-color: #5aaee8; }
button { width: 100%; background: #2d7fc1; color: #fff; border: none; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 16px; letter-spacing: 2px; cursor: pointer; }
button:hover { background: #3a8fd4; }
.result { margin-top: 20px; background: #061020; border: 1px solid rgba(61,220,132,0.3); border-radius: 6px; padding: 14px; display: none; }
.result-label { font-size: 11px; color: #4a6a8a; letter-spacing: 1px; margin-bottom: 6px; }
.result-code { font-size: 22px; color: #3ddc84; letter-spacing: 3px; font-weight: bold; }
.copy-btn { background: transparent; border: 1px solid rgba(61,220,132,0.4); color: #3ddc84; border-radius: 4px; padding: 6px 12px; font-family: monospace; font-size: 11px; cursor: pointer; margin-top: 10px; letter-spacing: 1px; }
.warn { background: #1a0a0a; border: 1px solid rgba(192,57,43,0.4); border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: #c0392b; line-height: 1.6; }
</style>
</head>
<body>
<h1>LINEUP ADMIN</h1>
<p>Generate unlock codes for paying customers.<br>Keep this page private — never share the URL publicly.</p>

<div class="card">
  <div class="warn">
    ⚠ This page generates unlock codes. Only use it after confirming PayPal payment. Keep this URL private.
  </div>
  <label>CUSTOMER EMAIL</label>
  <input type="email" id="emailIn" placeholder="customer@email.com">
  <button onclick="generate()">Generate Unlock Code</button>
  <div class="result" id="result">
    <div class="result-label">UNLOCK CODE FOR THIS EMAIL</div>
    <div class="result-code" id="codeOut"></div>
    <button class="copy-btn" onclick="copyCode()">Copy code</button>
    <div style="margin-top:12px;font-size:11px;color:#4a6a8a;line-height:1.6" id="emailTemplate"></div>
  </div>
</div>

<script>
// Must match HASH_SECRET in app.html exactly
const HASH_SECRET = 'lineup2026sail';

async function generate() {
  const email = document.getElementById('emailIn').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { alert('Enter a valid email'); return; }

  const str  = email + HASH_SECRET;
  const buf  = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  const hex  = Array.from(new Uint8Array(hash))
                 .map(b => b.toString(16).padStart(2,'0')).join('');
  const code = 'LU-' + hex.slice(0,4).toUpperCase() + '-' + hex.slice(4,8).toUpperCase();

  document.getElementById('codeOut').textContent = code;
  document.getElementById('result').style.display = 'block';
  document.getElementById('emailTemplate').innerHTML =
    '<strong style="color:#e8f4fd">Email to send:</strong><br><br>' +
    'Subject: Your LineUp Pro unlock code<br><br>' +
    'Thanks for supporting LineUp!<br><br>' +
    'Your unlock code is: <strong style="color:#3ddc84">' + code + '</strong><br><br>' +
    'To unlock:<br>' +
    '1. Open https://dmichals.github.io/lineUp/app.html<br>' +
    '2. Tap "Already paid? Enter unlock code"<br>' +
    '3. Enter your email (' + email + ') and the code above<br><br>' +
    'Fair winds!';
}

function copyCode() {
  const code = document.getElementById('codeOut').textContent;
  navigator.clipboard.writeText(code).then(() => alert('Copied: ' + code));
}
</script>
</body>
</html>
